startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      zarq_api_base:
        type: string
        default: "https://zarq.ai"
        description: "ZARQ API base URL"
    required: []
  commandFunction: |-
    (config) => ({
      command: "python",
      args: ["server.py"],
      env: {
        ZARQ_API_BASE: config.zarq_api_base ?? "https://zarq.ai"
      }
    })
